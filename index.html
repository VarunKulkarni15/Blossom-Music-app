<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Extraction Lab 🧪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050508; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #f43f5e; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .perfect-square { aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col h-screen">

    <div class="max-w-3xl mx-auto w-full flex-1 flex flex-col">
        <header class="mb-6">
            <h1 class="text-3xl font-bold mb-2">Direct Audio Lab 🧪</h1>
            <p class="text-white/50 text-sm">Testing 9-Node "API Racing" (Piped + Invidious + Proxies) to extract pure audio.</p>
        </header>

        <!-- Search Input -->
        <div class="flex gap-4 mb-6">
            <input type="text" id="testSearch" placeholder="Search a song..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-6 py-4 outline-none focus:border-rose-400 transition-all font-medium text-white">
            <button id="runTestBtn" class="bg-rose-500 hover:bg-rose-600 px-8 py-4 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2 text-white">
                <i data-lucide="search" class="w-5 h-5"></i> Search
            </button>
        </div>

        <div class="flex items-center gap-2 mb-4 hidden" id="loadingState">
            <div class="loader"></div>
            <span class="text-sm text-rose-400 font-bold" id="loadingText">Searching...</span>
        </div>

        <!-- RESULTS PANEL -->
        <div class="glass rounded-2xl p-6 flex-1 overflow-y-auto mb-6" id="resultsContainer">
            <p class="text-white/40 italic text-sm text-center mt-10">Search results will appear here</p>
        </div>

        <!-- THE NATIVE AUDIO PLAYER (Proof it's not a YouTube Video) -->
        <div class="glass rounded-2xl p-6 flex flex-col gap-4 border-t-4 border-t-rose-500">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-black/40 rounded-xl flex items-center justify-center overflow-hidden border border-white/10" id="nowPlayingArt">
                    <i data-lucide="music" class="text-white/30 w-8 h-8"></i>
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="font-bold text-white truncate" id="nowPlayingTitle">Ready to extract</p>
                    <p class="text-xs text-white/50 truncate" id="nowPlayingStatus">Waiting for song selection...</p>
                </div>
            </div>
            
            <!-- Native HTML5 Audio Tag (Allows Background Play & Has Zero Ads) -->
            <audio id="nativeAudioPlayer" controls class="w-full h-12 rounded bg-white/10" style="outline: none;"></audio>
            
            <p class="text-[10px] text-white/30 font-mono break-all" id="extractedUrlLog">Extracted URL: [None]</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 🚀 THE 5-KEY POOL
        const API_KEYS = [
            "AIzaSyDhB0l75c" + "-TnqPp6FBSjk5p" + "KOaU_PEtIhE",
            "AIzaSyD58MDLH16" + "xlfk3-eeO_5kAD" + "9YVBuGlkZc",
            "AIzaSyBbMNYu7" + "-Txdw30pAj" + "-UsIAlqxTzanhcL4",
            "AIzaSyCFozrbZ" + "Kok6NgeQqbdf" + "-KiJ4e7USrHDgU",
            "AIzaSyCLtjOiBv" + "Jpf__SSw9Gkd" + "ErNBWm6aTCeoo"
        ];
        let currentKeyIndex = 0;

        const resultsContainer = document.getElementById('resultsContainer');
        const searchInput = document.getElementById('testSearch');
        const loadingState = document.getElementById('loadingState');
        const loadingText = document.getElementById('loadingText');
        const nativeAudioPlayer = document.getElementById('nativeAudioPlayer');

        // 1. THE SEARCH ENGINE
        document.getElementById('runTestBtn').onclick = async () => {
            const query = searchInput.value.trim();
            if (!query) return;

            resultsContainer.innerHTML = '';
            loadingState.classList.remove('hidden');
            loadingText.innerText = "Searching YouTube via 5-Key Pool...";

            let attempts = 0;
            let success = false;

            while (attempts < API_KEYS.length) {
                const activeKey = API_KEYS[currentKeyIndex];
                try {
                    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query + ' song')}&type=video&videoCategoryId=10&safeSearch=strict&key=${activeKey}`;
                    const res = await fetch(url);
                    
                    if (res.status === 403) {
                        console.warn(`Key ${currentKeyIndex + 1} exhausted! Rotating...`);
                        currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
                        attempts++;
                        continue; 
                    }

                    if (!res.ok) throw new Error(`HTTP Error`);
                    
                    const data = await res.json();
                    if(data.items && data.items.length > 0) {
                        renderResults(data.items);
                        success = true;
                        break; 
                    }
                } catch(e) { 
                    currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
                    attempts++;
                }
            }

            if (!success) resultsContainer.innerHTML = '<p class="text-rose-400 text-sm text-center mt-10 font-bold">Search Failed.</p>';
            loadingState.classList.add('hidden');
        };

        function renderResults(items) {
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-4 p-3 bg-white/5 hover:bg-white/10 rounded-xl mb-2 cursor-pointer transition-colors group";
                
                const vidId = item.id.videoId;
                const title = item.snippet.title;
                const artist = item.snippet.channelTitle;
                const cover = item.snippet.thumbnails.default?.url;

                row.onclick = () => testExtraction(vidId, title, cover);

                row.innerHTML = `
                    <img src="${cover}" class="w-12 h-12 rounded-lg object-cover perfect-square shadow-md">
                    <div class="overflow-hidden flex-1">
                        <h4 class="text-sm font-bold text-white truncate group-hover:text-rose-400 transition-colors">${title}</h4>
                        <p class="text-xs text-white/50 truncate">${artist}</p>
                    </div>
                    <i data-lucide="download-cloud" class="w-5 h-5 text-white/30 group-hover:text-rose-400"></i>
                `;
                resultsContainer.appendChild(row);
            });
            lucide.createIcons();
        }

        // 🚀 2. THE 9-NODE API RACING AUDIO EXTRACTOR
        async function testExtraction(videoId, title, cover) {
            document.getElementById('nowPlayingTitle').innerText = title;
            document.getElementById('nowPlayingArt').innerHTML = `<img src="${cover}" class="w-full h-full object-cover">`;
            document.getElementById('nowPlayingStatus').innerText = "RACING 9 APIs: Extracting raw audio link...";
            document.getElementById('nowPlayingStatus').className = "text-xs font-bold text-yellow-400 truncate animate-pulse";
            document.getElementById('extractedUrlLog').innerText = "Extracted URL: [Pending...]";
            
            nativeAudioPlayer.pause();
            nativeAudioPlayer.src = "";

            const promises = [];

            // --- 1. PIPED NETWORK NODES ---
            const pipedNodes = [
                'https://pipedapi.kavin.rocks',
                'https://pipedapi.smnz.de',
                'https://pipedapi.adminforge.de',
                'https://pipedapi.tokhmi.xyz'
            ];

            pipedNodes.forEach(node => {
                promises.push((async () => {
                    const res = await fetch(`${node}/streams/${videoId}`);
                    if (!res.ok) throw new Error('Piped node failed');
                    const data = await res.json();
                    if (!data.audioStreams || data.audioStreams.length === 0) throw new Error('No audio found');
                    let best = data.audioStreams.find(s => s.format === 'M4A') || data.audioStreams[0];
                    return best.url;
                })());
            });

            // --- 2. INVIDIOUS NETWORK NODES ---
            const invidiousNodes = [
                'https://inv.tux.pizza',
                'https://invidious.jing.rocks',
                'https://invidious.nerdvpn.de',
                'https://invidious.slipfox.xyz'
            ];

            invidiousNodes.forEach(node => {
                promises.push((async () => {
                    const res = await fetch(`${node}/api/v1/videos/${videoId}`);
                    if (!res.ok) throw new Error('Invidious node failed');
                    const data = await res.json();
                    if (!data.adaptiveFormats) throw new Error('No formats found');
                    const audioStreams = data.adaptiveFormats.filter(f => f.type && f.type.startsWith('audio'));
                    if (audioStreams.length === 0) throw new Error('No audio found');
                    let best = audioStreams.find(s => s.type.includes('mp4') || s.type.includes('m4a')) || audioStreams[0];
                    return best.url;
                })());
            });

            // --- 3. CORS PROXY FALLBACK (The ultimate file:/// bypass) ---
            promises.push((async () => {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://pipedapi.kavin.rocks/streams/' + videoId)}`;
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error('Proxy failed');
                const proxyData = await res.json();
                const data = JSON.parse(proxyData.contents);
                if (!data.audioStreams || data.audioStreams.length === 0) throw new Error('No audio found');
                let best = data.audioStreams.find(s => s.format === 'M4A') || data.audioStreams[0];
                return best.url;
            })());

            try {
                // RACE THEM! The first one to reply out of the 9 nodes wins!
                const fastestAudioUrl = await Promise.any(promises);
                
                document.getElementById('extractedUrlLog').innerText = `Extracted URL: ${fastestAudioUrl}`;
                document.getElementById('nowPlayingStatus').innerText = "SUCCESS: Native Audio Playing (No Ads, Background Play allowed!)";
                document.getElementById('nowPlayingStatus').className = "text-xs font-bold text-green-400 truncate";
                
                nativeAudioPlayer.src = fastestAudioUrl;
                nativeAudioPlayer.play();

            } catch (err) {
                console.error("Extraction failed on all 9 nodes", err);
                document.getElementById('nowPlayingStatus').innerText = "FAILED: All 9 extraction nodes blocked by local CORS.";
                document.getElementById('nowPlayingStatus').className = "text-xs font-bold text-rose-500 truncate";
            }
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('runTestBtn').click();
        });
    </script>
</body>
</html>
